version: '3.8'

services:
  meta-automl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meta-automl-app
    volumes:
      # Montar datos locales
      - ./data:/app/data
      # Montar resultados y logs
      - ./errors:/app/errors
      - ./docs:/app/docs
    environment:
      # Aquí puedes añadir variables de entorno si es necesario
      # Por ejemplo, si tienes un archivo .env
      - PYTHONUNBUFFERED=1
    # Descomentar si necesitas una API con puerto expuesto
    # ports:
    #   - "8000:8000"
    # Para ejecutar modo interactivo, descomentar:
    # stdin_open: true
    # tty: true
